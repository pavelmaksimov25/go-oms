apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: oms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: go-oms-inventory:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50052
          env:
            - name: GRPC_PORT
              value: "50052"
            - name: KAFKA_BROKERS
              value: "kafka.oms.svc.cluster.local:9092"
