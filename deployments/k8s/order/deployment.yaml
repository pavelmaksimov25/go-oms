apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: oms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: go-oms-order:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50051
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: KAFKA_BROKERS
              value: "kafka.oms.svc.cluster.local:9092"
