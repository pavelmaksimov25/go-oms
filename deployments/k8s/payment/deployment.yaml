apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: oms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: go-oms-payment:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 50053
            - name: http
              containerPort: 8080
          env:
            - name: GRPC_PORT
              value: "50053"
            - name: HTTP_PORT
              value: "8080"
            - name: KAFKA_BROKERS
              value: "kafka.oms.svc.cluster.local:9092"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
